<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    
    <!-- Titre de l'application -->
    <title>ROTARY CLUB | Gestion Trésorerie & Facturation</title>

    <!-- SEO & Description -->
    <meta name="description" content="Plateforme centralisée de gestion pour les clubs Rotary : Facturation automatisée, suivi des paiements bancaires, relances mensuelles et génération d'attestations de dons. Simplifiez la trésorerie de votre club." />
    <meta name="author" content="Rotary Management" />

    <!-- Thème de la barre d'adresse (Teal) -->
    <meta name="theme-color" content="#0d9488" />

    <!-- Open Graph / Facebook -->
    <meta property="og:title" content="ROTARY CLUB - Gestion Financière des Clubs" />
    <meta property="og:description" content="Système intégré de facturation et de suivi des cotisations pour les clubs Rotary." />
    <meta property="og:image" content="/images/logo/logo.png" /> <!-- Assurez-vous que le chemin est correct plus tard -->
    <meta property="og:url" content="https://votre-domaine-rotary.com" />
    <meta property="og:type" content="website" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:title" content="ROTARY CLUB | Gestion Trésorerie" />
    <meta property="twitter:description" content="Plateforme de gestion des cotisations et factures pour clubs Rotary." />

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    
    <!-- Polices (Optionnel : Inter ou Roboto pour un look propre) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">

    <style>
      body {
        margin: 0;
